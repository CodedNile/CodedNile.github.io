site_name: CodedNile
site_description: Welcome to my channel
site_url: https://codednile.github.io/

theme:
  name: material
  custom_dir: overrides
  language: en
  favicon: assets/favicon2.png
  logo: assets/logo2.png
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode

    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.pruning
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/custom_theme_v2.css

plugins:
  - search
  - blog:
      blog_dir: .
      archive_date_format: yyyy
      archive_url_date_format: yyyy
      categories_allowed:
        - Before the Programming
        - Dart
        - Task
        - Answer
      post_url_format: "{slug}"
  - tags:
      tags_file: tags.md
  - git-committers:
      repository: CodedNile/CodedNile.github.io
      branch: main
      token: !ENV GH_TOKEN
  - rss:
      match_path: ".*"
      pretty_print: true
      use_git: false
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: false
      enable_creation_date: true
#  - minify:
#      minify_html: true

extra:
  social:
    - icon: simple/youtube
      link: https://www.youtube.com/channel/UChcojXFS9lMVDg_xBsfrnIQ
    - icon: fontawesome/brands/github-alt
      link: https://github.com/Poula-Ashraf-Ramzy
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/poula-ashraf-6a15422a5

hooks:
  - hooks/socialmedia.py

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
